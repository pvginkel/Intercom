schemaVersion: "0.1"
producer: intercom

# Intercom — ESP32 audio intercom firmware (I2S mic + speaker). Signals over MQTT
# (intercom/client/<id>/...) and streams audio over UDP with the Intercom Server.
#
# This repo introduces the FIRMWARE, not the physical device (registered in IoT
# Support, generated as a device: instance there). Two units today, more planned.
# Modeled as if already migrated to the esp-mdm platform (per operator).
#
# Beyond the universal MDM edges, the firmware consumes the Intercom relay
# service (svc:intercom, owned by the intercom-server producer) over its fixed
# MQTT topic contract. The topic namespace is hardcoded in both peers → no
# boundBy. The peer UDP audio stream rides addresses the server pushes over those
# topics, so it is covered by this edge rather than a separate surface.

systemSoftware:
  - id: ss:intercom-v1,c943f60c-e495-4355-af9a-bef67c46f0df
    label: Intercom firmware (v1)
    summary: >-
      ESP-IDF firmware for the v1 board revision of an ESP32 audio intercom
      (I2S microphone and speaker). Uses MQTT for call signalling and a peer UDP
      stream for audio with the Intercom Server; managed by IoT Support.
    introduced: 2025-02-15
    lifecycle: active
    stereotype: SoftwareProduct
    sourceRepository: git:pvginkel/Intercom
    stats:
      mcu: esp32
      hardwareVersion: "1"

  - id: ss:intercom-v2,bf17d137-676b-464a-ad5a-3460602766e6
    label: Intercom firmware (v2)
    summary: >-
      ESP-IDF firmware for the v2 board revision of an ESP32 audio intercom
      (I2S microphone and speaker). Identical functionality to v1, targeting the
      new hardware revision. Uses MQTT for call signalling and a peer UDP stream
      for audio with the Intercom Server; managed by IoT Support.
    introduced: 2026-06-05
    lifecycle: active
    stereotype: SoftwareProduct
    sourceRepository: git:pvginkel/Intercom
    stats:
      mcu: esp32
      hardwareVersion: "2"

